name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release

      # When a release is cut, move the floating major tag (e.g. v1) to
      # point at the new tag. Release Please doesn't do this natively.
      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - if: ${{ steps.release.outputs.release_created }}
        name: Move floating major tag
        env:
          MAJOR: ${{ steps.release.outputs.major }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "v${MAJOR}" "${TAG}" -m "Move v${MAJOR} to ${TAG}"
          git push --force origin "v${MAJOR}"
